name: walk_tracker
description: تطبيق تتبع المشي مع الخرائط والصوت
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  audioplayers: ^6.0.0
  sqflite: ^2.3.0
  path: ^1.9.0
  cupertino_icons: ^1.0.2
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
